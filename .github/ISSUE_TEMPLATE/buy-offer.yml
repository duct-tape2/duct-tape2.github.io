name: Buyer Help
description: Ask for delivery help or confirm a public-safe paid order.
title: "[BUY] "
labels: ["buyer-inquiry"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for delivery help after buying, or for public-safe pre-purchase questions.

        Do not post payment records, screenshots, passwords, API keys, private customer data, or private files here.

        Payment acceptance is temporarily paused while payout settings are restored. Confirm a working checkout before paying. Digital delivery or service intake starts only after payment is confirmed.
  - type: dropdown
    id: product
    attributes:
      label: Product or booking
      options:
        - Repo-to-Revenue Launch Bundle - $39
        - AI Money Stack - $25
        - Shorts Item Generator Starter - $9
        - GitHub Pages Storefront Starter - $19
        - Anki Deck Builder Kit - $19
        - Easy Japanese Pack - $29
        - Storefront Review - request first ($49)
        - Anki Deck Review - request first ($49)
        - Repo-to-Revenue Setup - $99
        - Anki Deck Packaging - $99
        - Free tools thank-you tip - $5
        - Not sure yet
    validations:
      required: true
  - type: dropdown
    id: status
    attributes:
      label: What do you need?
      options:
        - Confirm a working checkout before payment
        - Existing paid download or delivery problem
        - Service intake question
        - Review request before payment
        - Pre-purchase question
        - Download or link problem
        - Refund or support question
    validations:
      required: true
  - type: textarea
    id: public-note
    attributes:
      label: Public-safe note
      description: Do not include private payment details. A short description is enough.
      placeholder: I need a confirmed checkout for the $29 pack, or help choosing the right offer.
    validations:
      required: true
  - type: input
    id: email-sent
    attributes:
      label: Did you email private support or intake details?
      description: Answer yes/no. Do not write a private email address or payment record here.
      placeholder: yes
    validations:
      required: false
