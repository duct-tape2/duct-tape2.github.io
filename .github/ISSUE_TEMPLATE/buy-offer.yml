name: Buyer Help
description: Ask for delivery help or confirm a public-safe paid order.
title: "[BUY] "
labels: ["buyer-inquiry"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for delivery help after buying, or for public-safe pre-purchase questions.

        Do not post payment records, screenshots, passwords, API keys, private customer data, or private files here.

        Payhip delivers digital products automatically. For services, follow the listing intake instructions. The $49 reviews start with a request before payment.
  - type: dropdown
    id: product
    attributes:
      label: Product or booking
      options:
        - Repo-to-Revenue Launch Bundle - Payhip $39
        - AI Money Stack - Payhip $25
        - Shorts Item Generator Starter - Payhip $9
        - GitHub Pages Storefront Starter - Payhip $19
        - Anki Deck Builder Kit - Payhip $19
        - Easy Japanese Pack - Payhip $29
        - Storefront Review - request first ($49)
        - Anki Deck Review - request first ($49)
        - Repo-to-Revenue Setup - Payhip $99
        - Anki Deck Packaging - Payhip $99
        - Free tools thank-you tip - Payhip $5
        - Not sure yet
    validations:
      required: true
  - type: dropdown
    id: status
    attributes:
      label: What do you need?
      options:
        - Payhip download or delivery problem
        - Service intake question
        - Review request before payment
        - Pre-purchase question
        - Download or link problem
        - Refund or support question
    validations:
      required: true
  - type: textarea
    id: public-note
    attributes:
      label: Public-safe note
      description: Do not include private payment details. A short description is enough.
      placeholder: Payhip delivery failed for the $29 pack, or I need help choosing the right offer.
    validations:
      required: true
  - type: input
    id: email-sent
    attributes:
      label: Did you email private support or intake details?
      description: Answer yes/no. Do not write a private email address or payment record here.
      placeholder: yes
    validations:
      required: false
